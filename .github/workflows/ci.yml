name: Local Full CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build .NET app
        run: dotnet build

      - name: Run tests
        run: dotnet test

      - name: Build Docker image
        run: docker build -t sample-api:latest .

      # 1. Bootstrap (safe to run multiple times OR convert to Job later)
      - name: Run bootstrap in cluster
        run: |
          kubectl apply -f k8s/bootstrap-job.yaml
          kubectl wait --for=condition=complete job/api-bootstrap -n sample

      # 2. Deploy / update app
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/api -n sample